<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A simple tip calculator that splits the bill, tip, and total per person." />
  <meta name="theme-color" content="#0f172a" />
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="calculator">
    <h1>Tip Calculator</h1>

    <form id="tip-form" class="tip-form">
      <div class="field">
        <label for="bill">Bill Amount</label>
        <input
          type="number"
          id="bill"
          name="bill"
          min="0"
          step="0.01"
          placeholder="0.00"
          inputmode="decimal"
        />
      </div>

      <div class="field">
        <label for="tip">Tip Percentage (%)</label>
        <input
          type="number"
          id="tip"
          name="tip"
          min="0"
          step="1"
          placeholder="15"
          inputmode="numeric"
        />
      </div>

      <div class="field">
        <label for="split">Number of People</label>
        <input
          type="number"
          id="split"
          name="split"
          min="1"
          step="1"
          value="1"
          placeholder="1"
          inputmode="numeric"
        />
      </div>
    </form>

    <section class="results" aria-live="polite">
      <div class="result-row">
        <span class="result-label">Tip Amount</span>
        <span class="result-value" id="tip-amount">$0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">Total</span>
        <span class="result-value" id="total-amount">$0.00</span>
      </div>
      <div class="result-row">
        <span class="result-label">Per Person</span>
        <span class="result-value" id="per-person">$0.00</span>
      </div>
    </section>
  </main>

  <script src="src/app.js" defer></script>
</body>
</html>
