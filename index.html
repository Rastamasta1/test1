<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guestbook</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Guestbook</h1>
      <p class="subtitle">Leave a message for everyone to see.</p>
    </header>

    <form id="guestbook-form" class="form">
      <div class="field">
        <label for="name">Name</label>
        <input id="name" name="name" type="text" placeholder="Your name" required />
      </div>
      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="3" placeholder="Say something nice..." required></textarea>
      </div>
      <button type="submit" class="btn">Sign Guestbook</button>
      <p id="form-status" class="status" role="status"></p>
    </form>

    <section class="messages-section">
      <h2>Messages</h2>
      <ul id="messages-list" class="messages-list"></ul>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
