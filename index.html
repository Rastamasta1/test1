<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/theme.css" />
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="app-header__brand">
        <h1 class="app-header__title" id="board-title">Kanban Board</h1>
      </div>
      <div class="app-header__actions">
        <button type="button" class="btn btn--ghost" id="reset-board-btn">Reset</button>
        <button type="button" class="btn btn--primary" id="add-column-btn">+ Add Column</button>
      </div>
    </header>

    <main class="board-wrapper">
      <div class="board" id="board" role="list" aria-label="Board columns">
        <!-- Columns are rendered here by the app -->
      </div>
    </main>
  </div>

  <script type="module" src="src/main.ts"></script>
</body>
</html>
